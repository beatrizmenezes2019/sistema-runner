name: Sistema Runner CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' 
  pull_request:
    branches: [ "main" ]

jobs:
  build-go-apps:
    name: Build CLIs Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        app: [cli-assinatura, cli-simulador]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build Multiplataforma
      working-directory: ./${{ matrix.app }}
      run: |
        mkdir -p ../build/${{ matrix.app }}
        go mod tidy
        BINARY_NAME=${{ matrix.app }}-${{ matrix.goos }}-amd64
        if [ "${{ matrix.goos }}" = "windows" ]; then BINARY_NAME=$BINARY_NAME.exe; fi
        
        # Ajuste do caminho do main dependendo do app
        CMD_PATH="./cmd/assinatura/main.go"
        if [ "${{ matrix.app }}" = "cli-simulador" ]; then CMD_PATH="./cmd/simulador/main.go"; fi
        
        GOOS=${{ matrix.goos }} GOARCH=amd64 go build -o ../build/${{ matrix.app }}/$BINARY_NAME $CMD_PATH

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: check-build-${{ matrix.app }}-${{ matrix.goos }}
        path: build/

  build-java-assinador:
    name: Build Assinador Java
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      working-directory: ./assinador
      run: |
        mvn clean package -DskipTests
        mv target/assinador-*.jar target/assinador.jar

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: assinador-jar
        path: assinador/target/assinador.jar

  release:
    name: Publicar Release
    needs: [build-go-apps, build-java-assinador]
    if: startsWith(github.ref, 'refs/tags/v') 
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
    - uses: actions/checkout@v4

    - name: Download Go Artifacts
      uses: actions/download-artifact@v4
      with:
        path: temp-go
        pattern: check-build-*
        merge-multiple: true

    - name: Download Java Artifact
      uses: actions/download-artifact@v4
      with:
        name: assinador-jar
        path: dist/ 

    - name: Organizar Binários Go para Release
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        mkdir -p dist
        cp -r temp-go/* dist/ || true
        rm -rf temp-go

    - name: Criar GitHub Release
      uses: softprops/action-gh-release@v2  
      with:
        files: |
          dist/*.exe
          dist/*.jar
          dist/*-amd64
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}