name: Sistema Runner CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------------------------
  # Lint Go (D — aderência ao estilo exigida via CI)
  # ---------------------------------------------------------------------------
  lint-go:
    name: Lint Go — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cli-assinatura, cli-simulador]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'   # deve coincidir com a versão Go usada para compilar golangci-lint

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./${{ matrix.app }}
          args: --timeout=5m

  # ---------------------------------------------------------------------------
  # Testes Go com cobertura (Linux)
  # ---------------------------------------------------------------------------
  test-go:
    name: Testes Go — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cli-assinatura, cli-simulador]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Executar testes com cobertura
        working-directory: ./${{ matrix.app }}
        run: |
          go mod tidy
          go test ./... -v -count=1 -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: Upload relatório de cobertura Go
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go-${{ matrix.app }}
          path: ./${{ matrix.app }}/coverage.out

  # ---------------------------------------------------------------------------
  # Testes Java com cobertura (JaCoCo)
  # ---------------------------------------------------------------------------
  test-java:
    name: Testes Java — assinador
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Instalar SoftHSM2 (PKCS#11 simulado)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y softhsm2
          # Cria config com diretório de tokens acessível pelo runner
          mkdir -p /tmp/softhsm/tokens
          printf 'directories.tokendir = /tmp/softhsm/tokens/\nobjectstore.backend = file\n' > /tmp/softhsm2.conf
          export SOFTHSM2_CONF=/tmp/softhsm2.conf
          echo "SOFTHSM2_CONF=/tmp/softhsm2.conf" >> $GITHUB_ENV
          softhsm2-util --init-token --slot 0 --label "TestToken" --pin 1234 --so-pin 0000
          echo "SOFTHSM2_AVAILABLE=true" >> $GITHUB_ENV

      - name: Executar testes com JaCoCo
        working-directory: ./assinador
        env:
          SOFTHSM2_AVAILABLE: ${{ env.SOFTHSM2_AVAILABLE }}
          SOFTHSM2_CONF: ${{ env.SOFTHSM2_CONF }}
        run: mvn test jacoco:report

      - name: Upload relatório de cobertura Java
        uses: actions/upload-artifact@v4
        with:
          name: coverage-java-jacoco
          path: assinador/target/site/jacoco/

  # ---------------------------------------------------------------------------
  # Testes Go em Windows (E6 — portabilidade real comprovada em CI)
  # ---------------------------------------------------------------------------
  test-go-windows:
    name: Testes Go (Windows) — ${{ matrix.app }}
    runs-on: windows-latest
    strategy:
      matrix:
        app: [cli-assinatura, cli-simulador]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Executar testes
        working-directory: ./${{ matrix.app }}
        run: |
          go mod tidy
          go test ./... -v -count=1

  # ---------------------------------------------------------------------------
  # Build CLIs Go (multiplataforma)
  # ---------------------------------------------------------------------------
  build-go-apps:
    name: Build CLIs Go
    needs: [lint-go, test-go, test-go-windows]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        app: [cli-assinatura, cli-simulador]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Multiplataforma
        working-directory: ./${{ matrix.app }}
        run: |
          go mod tidy
          COMMIT=$(git rev-parse --short HEAD)
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" != v* ]]; then VERSION="dev"; fi

          BINARY_NAME=${{ matrix.app }}-${VERSION}-${{ matrix.goos }}-amd64
          if [ "${{ matrix.goos }}" = "windows" ]; then BINARY_NAME=${BINARY_NAME}.exe; fi

          CMD_PATH="./cmd/assinatura/main.go"
          if [ "${{ matrix.app }}" = "cli-simulador" ]; then CMD_PATH="./cmd/simulador/main.go"; fi

          LDFLAGS="-X github.com/beatrizmenezes2019/sistema-runner/${{ matrix.app }}/internal/cli.BuildVersion=${VERSION} \
                   -X github.com/beatrizmenezes2019/sistema-runner/${{ matrix.app }}/internal/cli.BuildCommit=${COMMIT}"

          mkdir -p ../build/${{ matrix.app }}
          GOOS=${{ matrix.goos }} GOARCH=amd64 go build \
            -ldflags "${LDFLAGS}" \
            -o ../build/${{ matrix.app }}/$BINARY_NAME \
            $CMD_PATH

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}-${{ matrix.goos }}
          path: build/

  # ---------------------------------------------------------------------------
  # Build assinador.jar
  # ---------------------------------------------------------------------------
  build-java-assinador:
    name: Build Assinador Java
    needs: test-java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build com Maven
        working-directory: ./assinador
        run: |
          mvn clean package -DskipTests
          mv target/assinador-*.jar target/assinador.jar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assinador-jar
          path: assinador/target/assinador.jar

  # ---------------------------------------------------------------------------
  # Release (apenas em tags v*)
  # Inclui: checksums SHA256, assinatura Cosign (US-05.3)
  # ---------------------------------------------------------------------------
  release:
    name: Publicar Release
    needs: [build-go-apps, build-java-assinador]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # necessário para Cosign OIDC keyless signing

    steps:
      - uses: actions/checkout@v4

      - name: Baixar artefatos Go
        uses: actions/download-artifact@v4
        with:
          path: temp-build
          pattern: build-*
          merge-multiple: true

      - name: Baixar artefato Java
        uses: actions/download-artifact@v4
        with:
          name: assinador-jar
          path: dist/

      - name: Organizar binários para release
        run: |
          mkdir -p dist
          find temp-build -type f | xargs -I{} cp {} dist/ 2>/dev/null || true
          rm -rf temp-build

      - name: Gerar checksums SHA256
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3

      - name: Assinar artefatos com Cosign (keyless OIDC)
        run: |
          cd dist
          for f in $(ls | grep -v SHA256SUMS.txt); do
            cosign sign-blob \
              --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          # Assina também o arquivo de checksums
          cosign sign-blob \
            --yes \
            --output-signature "SHA256SUMS.txt.sig" \
            --output-certificate "SHA256SUMS.txt.pem" \
            SHA256SUMS.txt

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Verificação de integridade

            Verifique um artefato com Cosign:
            ```bash
            cosign verify-blob \
              --signature <arquivo>.sig \
              --certificate <arquivo>.pem \
              --certificate-identity-regexp "https://github.com/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              <arquivo>
            ```

            Verifique o checksum SHA-256:
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
