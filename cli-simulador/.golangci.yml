run:
  go: "1.24"   # versão de linguagem usada na análise; evita conflito com golangci-lint < go1.26

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - bodyclose

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    - path: cmd/
      linters: [errcheck]
